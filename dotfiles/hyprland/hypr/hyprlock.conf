# ==============================================================
#  Hyprlock Config  |  sagnik / Ryzen 5 5600H + GTX 1650
#  Wallpaper-blurred lock screen with system info
# ==============================================================

# ── Wallpaper Background ─────────────────────────────────────
background {
    monitor =
    path = ~/Pictures/wallpaper.jpg
    blur_passes = 5
    blur_size = 10
    noise = 0.0117
    contrast = 0.8917
    brightness = 0.5
    vibrancy = 0.15
    vibrancy_darkness = 0.1
}

# ── Dark overlay for readability ────────────────────────────
background {
    monitor =
    path = solid
    color = rgba(10, 10, 15, 0.4)
}

# ── Clock (HH:MM) ────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255, 255, 255, 0.95)
    font_size = 110
    font_family = "JetBrainsMono Nerd Font"
    position = 0, -100
    halign = center
    valign = center
}

# ── Date ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d %B')"
    color = rgba(200, 200, 210, 0.75)
    font_size = 24
    font_family = "sans-serif"
    position = 0, -180
    halign = center
    valign = center
}

# ── Greeting ─────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1800000] echo "Welcome back, $(whoami)"
    color = rgba(255, 255, 255, 0.35)
    font_size = 14
    font_family = "sans-serif"
    position = 0, -220
    halign = center
    valign = center
}

# ── Password Input ───────────────────────────────────────────
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(30, 30, 40, 0.6)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    placeholder_text = "Lock"
    hide_input = false
    position = 0, 50
    halign = center
    valign = center
    rounding = 12
}

# ── Bottom hint ──────────────────────────────────────────────
label {
    monitor =
    text = Press ESC to cancel
    color = rgba(255, 255, 255, 0.25)
    font_size = 12
    font_family = "sans-serif"
    position = 0, 130
    halign = center
    valign = center
}
