# ── hyprglaze Config ─────────────────────────────────────────
# GPU-accelerated GLSL wallpaper with window/cursor awareness
# Install: see github.com/slastra/hyprglaze
# ============================================================

# ── Theme ────────────────────────────────────────────────────
# Built-in: Rosé Pine, Catppuccin, Tokyo Night, Nord, Gruvbox ...
theme = "Catppuccin Mocha"

# ── Effect ───────────────────────────────────────────────────
# particles | windowglow | cellbloom | concentric | fluid
# aurora | starfield | visualizer | milkdrop | buddy | ai-buddy | static
effect = "aurora"

[transition]
duration = 0.25

[cursor]
smoothing = 0.85

[geometry]
smoothing = 0.85

# ── Particle / Effect Settings ───────────────────────────────
[particles]
count = 60
damping = 0.999
pop_threshold = 50

[aurora]
speed = 0.3
density = 0.6

[starfield]
speed = 0.5
stars = 200

[visualizer]
smoothing = 0.7
bar_count = 32

[buddy]
scale = 2.0
sprite = "sprites/buddy.png"
ai_cooldown = 5.0
