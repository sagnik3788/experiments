# ==============================================================
#  Hyprland Config  v0.51  |  sagnik / Ryzen 5 5600H + GTX 1650
# ==============================================================

# ── Environment ───────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = WLR_NO_HARDWARE_CURSORS,1    # needed for NVIDIA flicker
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NIXOS_OZONE_WL,1

# ── Monitor ───────────────────────────────────────────────────
# eDP-1: 15.6" 1920x1080 @ 144Hz internal laptop display
monitor=eDP-1,1920x1080@144,0x0,1

# HDMI external (auto-detect when plugged)
monitor=HDMI-A-1,preferred,auto,1  # mirror or set position manually

# ── Autostart ─────────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
exec-once = waybar
exec-once = dunst
exec-once = swww-daemon && sleep 0.5 && swww img ~/Pictures/wallpaper.jpg
exec-once = /usr/lib/polkit-kde-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Plugins ─────────────────────────────────────────────────
exec-once = pypr                                    # Pyprland scratchpads + expose
# exec-once = hyprpm reload -n                        # Hyprland plugins (hyprpm add/enable)
# exec-once = hyprglaze                               # hyprglaze wallpaper daemon


# ── Input ─────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:escape          # CapsLock → Escape
    kb_rules =

    follow_mouse = 1
    accel_profile = flat              # no mouse acceleration
    sensitivity = 0                    # -1.0 … 1.0

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        drag_lock = yes
    }
}

# ── General ───────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(8aadf4ee) rgba(c6a0f6ee) rgba(f5a97fee) rgba(a6da95ee) 45deg
    col.inactive_border = rgb(494d64)

    layout = dwindle
    allow_tearing = false
}

# ── Decoration ────────────────────────────────────────────────
decoration {
    rounding = 8
    rounding_power = 2           # 1=sharp, 2=standard, 3+=more circular
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
    dim_inactive = false
    dim_strength = 0.1

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = on
        noise = 0.01
        contrast = 0.9
        brightness = 1.0
        vibrancy = 0.2           # punchier colors through blur
        vibrancy_darkness = 0.1  # keep dark areas readable
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(1a1a1aee)
    }
}

# ── Animations ────────────────────────────────────────────────
animations {
    enabled = yes

    # Custom bezier curves for buttery-smooth feel
    bezier = snappy,        0.2,  1.0,  0.1,  1.0
    bezier = smooth,        0.05, 0.9,  0.1,  1.05
    bezier = stylish,       0.17, 0.12, 0.32, 1
    bezier = easeOutQuint,  0.23, 1,    0.32, 1

    # Windows — slide in, pop in from 80% scale
    animation = windows,       1, 4,  easeOutQuint, slide
    animation = windowsIn,     1, 3,  smooth,       popin 80%
    animation = windowsOut,    1, 2,  smooth,       popin 0%
    animation = windowsMove,   1, 4,  easeOutQuint, slide

    # Fades
    animation = fade,          1, 3,  smooth
    animation = fadeIn,        1, 2,  smooth
    animation = fadeOut,       1, 2,  smooth
    animation = fadeSwitch,    1, 2,  smooth
    animation = fadeShadow,    1, 3,  smooth

    # Border — color transition + gradient spin once on open
    animation = border,        1, 5,  stylish
    animation = borderangle,   1, 30, stylish, once

    # Workspaces — slidefade with 15% movement for spatial feel
    animation = workspaces,             1, 4, easeOutQuint, slidefade 15%
    animation = workspacesIn,           1, 3, smooth,       slidefade 15%
    animation = workspacesOut,          1, 2, smooth,       slidefade 15%
    animation = specialWorkspace,       1, 3, smooth,       slidefadevert 25%
    animation = specialWorkspaceIn,     1, 3, smooth,       slidefadevert 25%
    animation = specialWorkspaceOut,    1, 2, smooth,       slidefadevert 25%
}

# ── Layer Rules (glassmorphism) ────────────────────────────────
layerrule = blur, waybar
layerrule = blur, rofi
layerrule = ignorezero, waybar
layerrule = ignorezero, rofi

# ── Misc / VFR / Performance ─────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 1                            # adaptive sync on
    animate_manual_resizes = true
    animate_mouse_windowdragging = false # smoother dragging
    focus_on_activate = true
    mouse_move_focuses_monitor = true
    close_special_on_empty = true
}

# Render quality
render {
    direct_scanout = true
}

# OpenGL backend for NVIDIA
opengl {
    nvidia_anti_flicker = true
}

# NVIDIA power-saving (keeps iGPU primary for desktop)
cursor {
    no_hardware_cursors = true
    no_break_fs_vrr = false
    sync_gsettings_theme = true
}

# ── Workspaces ────────────────────────────────────────────────
# Bind workspaces 1–10 to both keyboard and named monitors
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1, default:true
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# ── Window Rules ──────────────────────────────────────────────
# Float these by default
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float, class:^(qt5ct|qt6ct)$
windowrulev2 = float, title:^(Picture-in-Picture)$

# Pin them to center
windowrulev2 = center, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(blueman-manager)$

# Size hints for floating dialogs
windowrulev2 = size 55% 55%, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 60% 55%, class:^(nm-connection-editor)$

# ── Keybinds ──────────────────────────────────────────────────
$mainMod = SUPER
$term    = kitty
$browser = brave-browser
$fm      = nautilus
$launcher = rofi -show drun -show-icons
$launcherAlt = wofi --show drun
$menu    = rofi -show run

# --- Apps ---
bind = $mainMod,       RETURN,      exec, $term
bind = $mainMod SHIFT, RETURN,      exec, $term --title float -o remember_window_size=no  # floating terminal
bind = $mainMod,       B,           exec, $browser --new-window
bind = $mainMod,       F,           fullscreen, 1     # fake fullscreen (maximize)
bind = $mainMod SHIFT, F,           exec, $fm          # file manager
bind = $mainMod,       E,           exec, $menu        # run command
bind = $mainMod,       R,           exec, $launcher
bind = $mainMod SHIFT, R,           exec, $launcherAlt

# --- Window Management ---
bind = $mainMod,       Q,           killactive,
bind = $mainMod SHIFT, Q,           exit,
bind = $mainMod,       V,           togglefloating,
bind = $mainMod,       P,           pseudo,           # pseudo-tile (dwindle)
bind = $mainMod,       S,           togglesplit,      # horizontal/vertical split
bind = $mainMod,       F11,         fullscreen, 0
bind = $mainMod SHIFT, F11,         fullscreen,        # toggle fullscreen
bind = $mainMod SHIFT, space,       togglefloating,
bind = $mainMod,       Z,           exec, zed

# --- Focus ---
bind = $mainMod,       left,        movefocus, l
bind = $mainMod,       right,       movefocus, r
bind = $mainMod,       up,          movefocus, u
bind = $mainMod,       down,        movefocus, d
bind = $mainMod,       h,           movefocus, l
bind = $mainMod,       semicolon,   movefocus, r
bind = $mainMod,       k,           movefocus, u
bind = $mainMod,       j,           movefocus, d

# --- Move Windows ---
bind = $mainMod SHIFT, left,        movewindow, l
bind = $mainMod SHIFT, right,       movewindow, r
bind = $mainMod SHIFT, up,          movewindow, u
bind = $mainMod SHIFT, down,        movewindow, d
bind = $mainMod SHIFT, h,           movewindow, l
bind = $mainMod SHIFT, l,           movewindow, r
bind = $mainMod SHIFT, k,           movewindow, u
bind = $mainMod SHIFT, j,           movewindow, d

# --- Resize Windows ---
bind = $mainMod ALT,    left,       resizeactive, -30 0
bind = $mainMod ALT,    right,      resizeactive,  30 0
bind = $mainMod ALT,    up,         resizeactive,  0 -30
bind = $mainMod ALT,    down,       resizeactive,  0  30
bind = $mainMod ALT,    h,          resizeactive, -30 0
bind = $mainMod ALT,    semicolon,  resizeactive,  30 0
bind = $mainMod ALT,    k,          resizeactive,  0 -30
bind = $mainMod ALT,    j,          resizeactive,  0  30

# --- Workspaces ---
bind = $mainMod,       1,          workspace,  1
bind = $mainMod,       2,          workspace,  2
bind = $mainMod,       3,          workspace,  3
bind = $mainMod,       4,          workspace,  4
bind = $mainMod,       5,          workspace,  5
bind = $mainMod,       6,          workspace,  6
bind = $mainMod,       7,          workspace,  7
bind = $mainMod,       8,          workspace,  8
bind = $mainMod,       9,          workspace,  9
bind = $mainMod,       0,          workspace, 10

# Move active window to workspace (silent)
bind = $mainMod SHIFT, 1,          movetoworkspacesilent,  1
bind = $mainMod SHIFT, 2,          movetoworkspacesilent,  2
bind = $mainMod SHIFT, 3,          movetoworkspacesilent,  3
bind = $mainMod SHIFT, 4,          movetoworkspacesilent,  4
bind = $mainMod SHIFT, 5,          movetoworkspacesilent,  5
bind = $mainMod SHIFT, 6,          movetoworkspacesilent,  6
bind = $mainMod SHIFT, 7,          movetoworkspacesilent,  7
bind = $mainMod SHIFT, 8,          movetoworkspacesilent,  8
bind = $mainMod SHIFT, 9,          movetoworkspacesilent,  9
bind = $mainMod SHIFT, 0,          movetoworkspacesilent, 10

# Move window + follow
bind = $mainMod CTRL, 1,           movetoworkspace,  1
bind = $mainMod CTRL, 2,           movetoworkspace,  2
bind = $mainMod CTRL, 3,           movetoworkspace,  3
bind = $mainMod CTRL, 4,           movetoworkspace,  4
bind = $mainMod CTRL, 5,           movetoworkspace,  5
bind = $mainMod CTRL, 6,           movetoworkspace,  6
bind = $mainMod CTRL, 7,           movetoworkspace,  7
bind = $mainMod CTRL, 8,           movetoworkspace,  8
bind = $mainMod CTRL, 9,           movetoworkspace,  9
bind = $mainMod CTRL, 0,           movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod,       mouse_down, workspace, e+1
bind = $mainMod,       mouse_up,   workspace, e-1

# Special (scratchpad) workspace
bind = $mainMod,       grave,      togglespecialworkspace,
bind = $mainMod SHIFT, grave,      movetoworkspace, special

# --- Screenshots ---
bind = , PRInT,                     exec, grim - | wl-copy && wl-paste > ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod,       PRInT,       exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod SHIFT, PRInT,       exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png

# --- Multimedia Keys ---
bind = , XF86AudioRaiseVolume,      exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,      exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,             exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,          exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86MonBrightnessUp,       exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown,     exec, brightnessctl set 5%-
bind = , XF86AudioPlay,             exec, playerctl play-pause
bind = , XF86AudioNext,             exec, playerctl next
bind = , XF86AudioPrev,             exec, playerctl previous
bind = , XF86AudioStop,             exec, playerctl stop

# Super + media keys as fallback
bind = $mainMod, F1,                exec, brightnessctl set 5%-
bind = $mainMod, F2,                exec, brightnessctl set +5%
bind = $mainMod, F3,                exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F4,                exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, F5,                exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod, F6,                exec, playerctl play-pause
bind = $mainMod, F7,                exec, playerctl previous
bind = $mainMod, F8,                exec, playerctl next

# --- Layout / Misc ---
bind = $mainMod,       G,           togglegroup
bind = $mainMod,       TAB,         changegroupactive, f
bind = $mainMod SHIFT, TAB,         changegroupactive, b

bind = $mainMod,       space,       togglefloating,
bind = $mainMod,       C,           centerwindow

# Quick launcher binds
bind = $mainMod,       N,           exec, $fm
bind = $mainMod,       O,           exec, obsidian

# Wallpaper controls
bind = $mainMod ALT,    W,          exec, swww img ~/Pictures/wallpaper.jpg --transition-type center
bind = $mainMod ALT,    N,          exec, swww img $(find ~/Pictures/wallpapers -type f | shuf -n 1) --transition-type random --transition-duration 2
bind = $mainMod SHIFT,  W,          exec, ~/.config/hypr/scripts/WallpaperPicker.sh    # file picker
bind = $mainMod ALT,    A,          exec, ~/.config/hypr/scripts/WallpaperAutoChange.sh ~/Pictures/wallpapers  # auto-rotate every 30min

# Notification toggle
bind = $mainMod,       D,           exec, dunstctl set-paused toggle
bind = $mainMod SHIFT, D,           exec, dunstctl close-all
bind = $mainMod CTRL,  D,           exec, dunstctl history-pop

# System controls
bind = $mainMod,       L,           exec, hyprlock                # lock screen (Win+L)
bind = $mainMod CTRL,  L,           exec, hyprctl dispatch dpms off # turn off display

# Reload config
bind = $mainMod SHIFT, C,           exec, hyprctl reload

# Screen recording (Super+Shift+R = full screen, Super+Alt+R = region)
bind = $mainMod SHIFT, R,           exec, ~/.config/hypr/scripts/RecordToggle.sh     # full screen record
bind = $mainMod ALT,    R,           exec, ~/.config/hypr/scripts/RecordRegion.sh    # region record

# Spawn kitty at cwd
bind = $mainMod SHIFT, T,           exec, kitty --working-directory "$(pwd)"

# WiFi / Bluetooth quick toggles
bind = $mainMod,       W,           exec, nmcli radio wifi $(nmcli radio wifi | grep -q enabled && echo off || echo on)
bind = $mainMod,       X,           exec, bluetoothctl power $(bluetoothctl show | grep -q 'Powered: yes' && echo off || echo on)

# System monitor (btop — install with: sudo dnf install btop)
bind = $mainMod,       T,           exec, kitty btop

# Rainbow borders toggle
bind = $mainMod,       Y,           exec, ~/.config/hypr/scripts/RainbowBorders.sh



# ── Plugin keybinds ──────────────────────────────────────────

# Pyprland scratchpads
bind = $mainMod,       grave,      exec, pypr summon terminal
bind = $mainMod SHIFT, B,          exec, pypr summon btop
# bind = $mainMod,       M,          exec, pypr summon music
bind = $mainMod CTRL,  grave,      exec, pypr toggle_dpms

# Pyprland expose (all windows overview)
# bind = $mainMod,       TAB,        exec, pypr expose

# Hyprspace workspace overview (hyprpm add/enable)
# bind = $mainMod,       TAB,        exec, hyprctl dispatch overview:toggle

# HyprFX window effects (windows burn/fade with fire/pixelate/CRT on close)
# bind = $mainMod CTRL,  F,          exec, hyprctl keyword plugin:hfx:close_effect fire

# HyprWindowShade — per-window shaders
# bind = $mainMod,       K,          exec, hyprctl dispatch togglewindowshader /path/to/shader.glsl

# Hyprtrails / Hyprbars / SwayOSD / hypr-dynamic-cursors — install + enable, auto-works

# Clipboard
bind = $mainMod SHIFT, V,           exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- Mouse binds ---
bindm = $mainMod, mouse:272, movewindow   # hold super + left click drag
bindm = $mainMod, mouse:273, resizewindow # hold super + right click drag

