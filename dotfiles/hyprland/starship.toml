# Starship Prompt Config ‚ÄĒ clean & minimal
# https://starship.rs/config/

format = """
[‚ē≠](fg:blue)\
$os\
$username\
[Óāį](bg:blue fg:bright-black)\
$directory\
[Óāį](fg:bright-black)\
$git_branch\
$git_status\
[Óāį](fg:bright-black)\
$fill\
$cmd_duration\
$time\
[\n‚ēį](fg:blue)\
$character\
"""

add_newline = true

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bg:blue fg:bright-black"
format = "[ $path ]($style)"

[git_branch]
symbol = "Ôźė "
style = "bg:bright-black fg:purple"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:bright-black fg:red"
format = '[$all_status$ahead_behind]($style)'

[cmd_duration]
min_time = 2000
format = "[ ÔČí $duration ]($style)"
style = "bg:yellow fg:black"

[time]
disabled = false
format = "[ ÔÄó $time ]($style)"
style = "bg:bright-black fg:white"

[character]
success_symbol = "[ÔĀĒ](green)"
error_symbol = "[ÔĀĒ](red)"
vimcmd_symbol = "[ÔćĮ](green)"

[os]
disabled = false
style = "bg:blue fg:black"
format = "[ ÔĆö ]($style)"

[username]
show_always = false
style_user = "bg:blue fg:black"
format = '[$user ]($style)'

[fill]
symbol = " "

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true
