/* ---- 💫 Gruvbox Material Kitty Config 💫 ---- */

# ── Font ──────────────────────────────────────────────────────────────────
font_family FantasqueSansM Nerd Font Mono Bold
font_size 16.0
bold_font auto
italic_font auto
bold_italic_font auto

# ── Transparency & Blur (works with Hyprland) ─────────────────────────────
background_opacity 0.85
dynamic_background_opacity 1
background_blur 8

# ── Window Decoration ─────────────────────────────────────────────────────
hide_window_decorations yes
confirm_os_window_close 0
window_padding_width 8

# ── Cursor ────────────────────────────────────────────────────────────────
cursor_trail 1
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ────────────────────────────────────────────────────────────
scrollback_lines 10000
wheel_scroll_min_lines 3

# ── Bell ──────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.5

# ── Performance ───────────────────────────────────────────────────────────
linux_display_server wayland
sync_to_monitor no

# ── Tab Bar ───────────────────────────────────────────────────────────────
tab_bar_style powerline
tab_bar_edge top
active_tab_foreground #1e1e2e
active_tab_background #89b4fa
inactive_tab_foreground #585b70
inactive_tab_background #1e1e2e
tab_bar_margin_width 0.0

# ── Gruvbox Material Colors ──────────────────────────────────────────────
# Text
foreground              #d4be98
background              #1d2021
selection_foreground    #1d2021
selection_background    #5a524c

# Black / Dark
color0                  #1d2021
color8                  #5a524c

# Red
color1                  #ea6962
color9                  #ea6962

# Green
color2                  #a9b665
color10                 #a9b665

# Yellow
color3                  #d8a657
color11                 #d8a657

# Blue
color4                  #7daea3
color12                 #7daea3

# Magenta
color5                  #d3869b
color13                 #d3869b

# Cyan
color6                  #89b482
color14                 #89b482

# White / Gray
color7                  #d4be98
color15                 #ebdbb2

# Cursor
cursor                  #d8a657
cursor_text_color       #1d2021

# Tab bar
active_tab_foreground   #1d2021
active_tab_background   #d8a657
inactive_tab_foreground #5a524c
inactive_tab_background #1d2021

# URL hints
url_color               #7daea3
url_style               curly

# Marks
mark1_foreground        #1d2021
mark1_background        #7daea3
mark2_foreground        #1d2021
mark2_background        #d3869b
mark3_foreground        #1d2021
mark3_background        #a9b665
