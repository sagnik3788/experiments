# =============================================================================
#  Tmux Config — Catppuccin Mocha Rice
# =============================================================================

# ── Base Settings ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g history-limit 10000
set -g mouse on
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -w -g automatic-rename on
set -g set-titles on

# ── True Color Support ────────────────────────────────────────────────────
set -g default-command "tmux set -g default-terminal 'screen-256color' \; set -ga terminal-overrides ',*256col*:Tc'"

# ── Gruvbox Material Palette ──────────────────────────────────────────────
# bg0_hard #1d2021
# bg0      #282828
# bg1      #3c3836
# bg2      #504945
# fg0      #d4be98
# fg1      #ddc7a1
# red      #ea6962
# green    #a9b665
# yellow   #d8a657
# blue     #7daea3
# purple   #d3869b
# aqua     #89b482
# orange   #e78a4e
# gray     #5a524c

# ── Status Bar ────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 2
set -g status-bg "#1d2021"
set -g status-fg "#d4be98"
set -g status-justify left
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

# ── Panes ─────────────────────────────────────────────────────────────────
set -g pane-active-border-style "fg=#7daea3"
set -g pane-border-style "fg=#504945"
set -g pane-border-lines heavy

# ── Messages ──────────────────────────────────────────────────────────────
set -g message-style "bg=#282828,fg=#d4be98"
set -g message-command-style "bg=#282828,fg=#d4be98"

# ── Clock Mode ────────────────────────────────────────────────────────────
setw -g clock-mode-colour "#7daea3"
setw -g clock-mode-style 24

# ── Copy Mode ─────────────────────────────────────────────────────────────
setw -g mode-style "bg=#504945,fg=#d4be98"

# ── Status Left (sessions + windows) ──────────────────────────────────────
set -g status-left "#[fg=#1d2021,bg=#d8a657,bold]   #S #[fg=#d8a657,bg=#1d2021,nobold]"

# ── Status Right (system info) ────────────────────────────────────────────
TMUX_GIT_CMD="#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)"

set -g status-right \
  "#[fg=#d4be98,bg=#1d2021]   $TMUX_GIT_CMD" \
  "#[fg=#5a524c]│" \
  "#[fg=#d4be98]  %H:%M " \
  "#[fg=#5a524c]│" \
  "#[fg=#d4be98]  %d/%m " \
  "#[fg=#5a524c]│" \
  "#[fg=#282828,bg=#d3869b]  #(uptime | awk -F'load average:' '{print $2}' | cut -d',' -f1) #[fg=#d3869b,bg=#282828]#[fg=#d4be98,bg=#282828] #(cut -d' ' -f1 /proc/loadavg)"

# ── Window Format ─────────────────────────────────────────────────────────
setw -g window-status-format \
  "#[fg=#5a524c,bg=#1d2021] #{?#{!=:#{window-name},zsh},#W,} #{?window_flags,#F, }"
setw -g window-status-current-format \
  "#[fg=#1d2021,bg=#7daea3]#[fg=#1d2021,bg=#7daea3,bold] #I  #{?#{!=:#{window-name},zsh},#W,} #{?window_flags,#F, }#[fg=#7daea3,bg=#1d2021]"
setw -g window-status-separator "  "

# ── Window Status Styles ──────────────────────────────────────────────────
setw -g window-status-style "fg=#5a524c,bg=#1d2021"
setw -g window-status-current-style "fg=#1d2021,bg=#7daea3"
setw -g window-status-last-style "fg=#d3869b,bg=#1d2021"
setw -g window-status-activity-style "fg=#d8a657,bg=#1d2021"
setw -g window-status-bell-style "fg=#1d2021,bg=#ea6962"

# ── Keybindings ───────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "    Config reloaded"

# Better splitting
bind "|" split-window -h -c "#{pane_current_path}"
bind "\\" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind "_" split-window -v -c "#{pane_current_path}"

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with Ctrl + arrows
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Swap panes
bind "{" swap-pane -U
bind "}" swap-pane -D

# Better window nav
bind -r H previous-window
bind -r L next-window

# Quick session list
bind s choose-tree -Zs

# Kill pane without confirmation
bind X kill-pane

# Clear history
bind -n M-c clear-history

# Open terminal in current directory
bind T new-window -c "#{pane_current_path}"

# Open a floating scratchpad
bind S new-window -d -n scratch "kitty --title tmux-scratch"

# Quick nvim from tmux
bind N new-window -d -n nvim -c "#{pane_current_path}" "kitty nvim"

# ── Mouse Support ─────────────────────────────────────────────────────────
bind -n WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -n WheelDownPane select-pane -t= \; send-keys -M
